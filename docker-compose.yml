version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ibn
      POSTGRES_PASSWORD: ibn
      POSTGRES_DB: ibn_controller
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://ibn:ibn@db:5432/ibn_controller
      SECRET_KEY: your-docker-secret
      ENABLE_DRIFT_SIMULATION: "true"
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
