<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deployment | IBN Controller</title>
  <link rel="stylesheet" href="/frontend/css/style.css" />
</head>
<body>
  <script src="/frontend/js/app.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth required');
    renderShell('Deployment Orchestration', 'deploy');

    async function init() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="card">
          <div class="card-header">
            <h3>🚀 Deploy Policy</h3>
          </div>
          <p>Select a policy and deploy it to target devices. The system handles retries, rollback, and logging.</p>
          <div id="deployMsg" class="message" style="display:none"></div>
          <form id="deployForm" style="display:grid; grid-template-columns:1fr auto auto; gap:12px; align-items:end;">
            <div>
              <label>Select Policy</label>
              <select id="policySelect"></select>
            </div>
            <button type="submit">Start Deployment</button>
            <button type="button" class="ghost" id="refreshBtn">↻ Refresh</button>
          </form>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>📊 Deployment Details</h3>
          </div>
          <div id="deploymentInfo">
            <div class="empty-state">
              <div class="empty-icon">🚀</div>
              <p>Select or run a deployment to view details</p>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>📝 Deployment Logs</h3>
          </div>
          <table>
            <thead><tr><th>Time</th><th>Level</th><th>Device</th><th>Message</th></tr></thead>
            <tbody id="logTable"></tbody>
          </table>
        </div>
      `;

      await loadPolicies();
      document.getElementById('deployForm').addEventListener('submit', onDeploy);
      document.getElementById('refreshBtn').addEventListener('click', refreshCurrent);

      const params = new URLSearchParams(window.location.search);
      const depId = params.get('deployment_id');
      if (depId) {
        currentDeploymentId = Number(depId);
        await loadDeployment(currentDeploymentId);
      }
    }

    let currentDeploymentId = null;

    async function loadPolicies() {
      const select = document.getElementById('policySelect');
      const policies = await apiFetch('/policies');
      if (!policies.length) {
        select.innerHTML = '<option value="">No policies found</option>';
        return;
      }
      select.innerHTML = policies.map(p => `<option value="${p.id}">${p.id} — ${p.name} (${p.action})</option>`).join('');
    }

    async function onDeploy(e) {
      e.preventDefault();
      const policyId = document.getElementById('policySelect').value;
      if (!policyId) return;
      try {
        const result = await apiFetch(`/deploy/${policyId}`, { method: 'POST', body: '{}' });
        currentDeploymentId = result.deployment.id;
        showMessage('deployMsg', result.message, result.deployment.status === 'success' ? 'success' : 'error');
        await loadDeployment(currentDeploymentId);
      } catch (err) {
        showMessage('deployMsg', err.message, 'error');
      }
    }

    async function refreshCurrent() {
      if (currentDeploymentId) await loadDeployment(currentDeploymentId);
    }

    async function loadDeployment(deploymentId) {
      const deployment = await apiFetch(`/deployments/${deploymentId}`);
      const statusClass = deployment.status === 'success' ? 'ok' : deployment.status === 'failed' ? 'err' : 'warn';

      document.getElementById('deploymentInfo').innerHTML = `
        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:16px;">
          <div class="kpi">
            <span class="label">Deployment ID</span>
            <span class="value" style="font-size:20px;">#${deployment.id}</span>
          </div>
          <div class="kpi">
            <span class="label">Status</span>
            <span class="value" style="font-size:16px;"><span class="badge ${statusClass}">${deployment.status}</span></span>
          </div>
          <div class="kpi">
            <span class="label">Retries</span>
            <span class="value" style="font-size:20px;">${deployment.retry_count}</span>
          </div>
          <div class="kpi">
            <span class="label">Rollback</span>
            <span class="value" style="font-size:16px;"><span class="badge ${deployment.rollback_performed ? 'warn' : 'ok'}">${deployment.rollback_performed ? 'Yes' : 'No'}</span></span>
          </div>
        </div>
        <div style="margin-top:16px; padding:12px 16px; background:var(--bg-input); border-radius:var(--radius-md); border:1px solid var(--border);">
          <span class="small">Summary:</span>
          <div style="color:var(--text-primary); font-size:13px; margin-top:4px;">${deployment.summary || '—'}</div>
          <div class="small" style="margin-top:8px;">Started: ${formatDate(deployment.started_at)} · Ended: ${formatDate(deployment.ended_at)}</div>
        </div>
      `;

      const logs = await apiFetch(`/deployments/${deploymentId}/logs`);
      document.getElementById('logTable').innerHTML = logs.map(log => `
        <tr>
          <td>${formatDate(log.created_at)}</td>
          <td><span class="badge ${log.level === 'ERROR' ? 'err' : log.level === 'WARN' ? 'warn' : 'ok'}">${log.level}</span></td>
          <td>${log.device_id || '—'}</td>
          <td style="color:var(--text-primary);">${log.message}</td>
        </tr>
      `).join('');
    }

    init();
  </script>
</body>
</html>
