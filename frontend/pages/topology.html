<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topology | Intent Controller</title>
  <link rel="stylesheet" href="/frontend/css/style.css" />
</head>
<body>
  <script src="/frontend/js/app.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth required');
    renderShell('Topology Discovery', 'topology');

    async function loadTopology() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="card">
          <h3>Topology Graph (LLDP/CDP modeled)</h3>
          <p class="small">Nodes are devices and edges are neighbor relationships discovered from simulated LLDP/CDP data.</p>
          <div class="topology-map" id="topologyMap"></div>
        </div>
        <div class="card">
          <h3>Topology Edges</h3>
          <table>
            <thead><tr><th>Source</th><th>Target</th><th>Local IF</th><th>Remote IF</th><th>Protocol</th><th>Last Seen</th></tr></thead>
            <tbody id="edgesTable"></tbody>
          </table>
        </div>
      `;

      try {
        const topo = await apiFetch('/topology');
        renderMap(topo);
        renderEdges(topo);
      } catch (err) {
        document.getElementById('topologyMap').innerHTML = `<div class="message error">${err.message}</div>`;
      }
    }

    function renderMap(topo) {
      const byId = Object.fromEntries(topo.nodes.map(n => [n.id, n]));
      const map = document.getElementById('topologyMap');
      if (!topo.edges.length) {
        map.innerHTML = '<div class="small">No topology edges discovered yet.</div>';
        return;
      }

      map.innerHTML = topo.edges.map(edge => `
        <div class="topology-row">
          <span class="node">${byId[edge.source_device_id]?.hostname || edge.source_device_id}</span>
          <span class="edge">${edge.local_interface || '-'} -> ${edge.remote_interface || '-'}</span>
          <span class="node">${byId[edge.target_device_id]?.hostname || edge.target_device_id}</span>
          <span class="badge warn">${edge.protocol}</span>
        </div>
      `).join('');
    }

    function renderEdges(topo) {
      const byId = Object.fromEntries(topo.nodes.map(n => [n.id, n]));
      document.getElementById('edgesTable').innerHTML = topo.edges.map(edge => `
        <tr>
          <td>${byId[edge.source_device_id]?.hostname || edge.source_device_id}</td>
          <td>${byId[edge.target_device_id]?.hostname || edge.target_device_id}</td>
          <td>${edge.local_interface || '-'}</td>
          <td>${edge.remote_interface || '-'}</td>
          <td>${edge.protocol}</td>
          <td>${formatDate(edge.last_seen)}</td>
        </tr>
      `).join('');
    }

    loadTopology();
  </script>
</body>
</html>
