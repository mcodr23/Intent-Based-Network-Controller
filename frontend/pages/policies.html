<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Policies | IBN Controller</title>
  <link rel="stylesheet" href="/frontend/css/style.css" />
</head>
<body>
  <script src="/frontend/js/app.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth required');
    renderShell('Intent & Policy Engine', 'policy');

    async function loadPolicies() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="grid two">
          <div class="card">
            <div class="card-header">
              <h3>📋 Create Intent</h3>
            </div>
            <p>Define a business-level network intent. The system translates it into device-specific configurations.</p>
            <div id="policyMsg" class="message" style="display:none"></div>
            <form id="intentForm">
              <label>Policy Name</label>
              <input id="name" required placeholder="e.g. Guest Isolation Policy" />
              <label>Description</label>
              <textarea id="description" placeholder="Deny guest VLAN traffic towards corporate network"></textarea>
              <div class="grid two">
                <div>
                  <label>Source Group</label>
                  <select id="source_group">
                    <option>guest</option><option>corporate</option><option>edge</option><option>branch</option>
                  </select>
                </div>
                <div>
                  <label>Destination Group</label>
                  <select id="destination_group">
                    <option>corporate</option><option>guest</option><option>edge</option><option>branch</option>
                  </select>
                </div>
              </div>
              <div class="grid two">
                <div>
                  <label>Action</label>
                  <select id="action"><option value="deny">Deny</option><option value="allow">Allow</option></select>
                </div>
                <div>
                  <label>Scope</label>
                  <input id="scope" value="campus" />
                </div>
              </div>
              <label>VLAN ID (optional)</label>
              <input id="vlan_id" type="number" min="1" max="4094" placeholder="e.g. 30" />
              <button type="submit">Create Policy</button>
            </form>
          </div>

          <div class="card">
            <div class="card-header">
              <h3>🔄 Intent Translation Preview</h3>
            </div>
            <p>When a policy is created, the business intent is normalized into structured JSON with ACL rules.</p>
            <pre id="translationPreview" style="min-height:200px;">{ "hint": "Create a policy to see the translation..." }</pre>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>📜 All Policies</h3>
          </div>
          <table>
            <thead><tr><th>ID</th><th>Name</th><th>Intent</th><th>Action</th><th>Scope</th><th>Created</th><th>Deploy</th></tr></thead>
            <tbody id="policyTable"></tbody>
          </table>
        </div>
      `;

      document.getElementById('intentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const vlanRaw = document.getElementById('vlan_id').value;
        const payload = {
          name: document.getElementById('name').value,
          description: document.getElementById('description').value,
          source_group: document.getElementById('source_group').value,
          destination_group: document.getElementById('destination_group').value,
          action: document.getElementById('action').value,
          scope: document.getElementById('scope').value || 'global',
          parameters: vlanRaw ? { vlan_id: Number(vlanRaw) } : {},
        };

        try {
          const policy = await apiFetch('/intent', {
            method: 'POST',
            body: JSON.stringify(payload),
          });
          showMessage('policyMsg', `Policy "${policy.name}" created (ID ${policy.id})`, 'success');
          document.getElementById('translationPreview').textContent = JSON.stringify(policy.structured_policy_json, null, 2);
          await refreshPolicyTable();
        } catch (err) {
          showMessage('policyMsg', err.message, 'error');
        }
      });

      await refreshPolicyTable();
    }

    async function refreshPolicyTable() {
      const policies = await apiFetch('/policies');
      const tbody = document.getElementById('policyTable');
      if (!policies.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No policies created yet</td></tr>';
        return;
      }
      tbody.innerHTML = policies.map(p => `
        <tr>
          <td>${p.id}</td>
          <td style="font-weight:600; color:var(--text-primary);">${p.name}</td>
          <td><code style="font-family:'JetBrains Mono',monospace; font-size:12px;">${p.source_group} → ${p.destination_group}</code></td>
          <td><span class="badge ${p.action === 'allow' ? 'ok' : 'err'}">${p.action}</span></td>
          <td>${p.scope}</td>
          <td>${formatDate(p.created_at)}</td>
          <td><button class="secondary" style="padding:6px 12px; font-size:12px;" onclick="quickDeploy(${p.id})">🚀 Deploy</button></td>
        </tr>
      `).join('');
    }

    async function quickDeploy(policyId) {
      try {
        const result = await apiFetch(`/deploy/${policyId}`, { method: 'POST', body: '{}' });
        alert(result.message);
        window.location.href = `/frontend/pages/deployment.html?deployment_id=${result.deployment.id}`;
      } catch (err) {
        alert(err.message);
      }
    }

    loadPolicies();
  </script>
</body>
</html>
