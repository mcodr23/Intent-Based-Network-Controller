<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compliance | IBN Controller</title>
  <link rel="stylesheet" href="/frontend/css/style.css" />
</head>
<body>
  <script src="/frontend/js/app.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth required');
    renderShell('Configuration Compliance', 'compliance');

    async function loadCompliance() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="card">
          <div class="card-header">
            <h3>🛡️ Compliance Status</h3>
            <button id="refreshComp" class="ghost">↻ Refresh</button>
          </div>
          <p>Compares intended (desired) config against live (current) config using SHA-256 hashing to detect unauthorized changes.</p>
          <div id="compMsg" class="message" style="display:none"></div>
          <table style="margin-top:12px;">
            <thead>
              <tr><th>Device</th><th>Status</th><th>Drift</th><th>Last Checked</th><th>Drift Details</th><th>Action</th></tr>
            </thead>
            <tbody id="compTable"></tbody>
          </table>
        </div>
      `;

      document.getElementById('refreshComp').addEventListener('click', refreshTable);
      await refreshTable();
    }

    async function refreshTable() {
      try {
        const list = await apiFetch('/compliance');
        document.getElementById('compTable').innerHTML = list.map(item => `
          <tr>
            <td style="font-weight:600; color:var(--text-primary);">Device #${item.device_id}</td>
            <td><span class="badge ${item.status === 'compliant' ? 'ok' : 'err'}">${item.status}</span></td>
            <td><span class="badge ${item.drift_detected ? 'err' : 'ok'}">${item.drift_detected ? 'Drift Detected' : 'Clean'}</span></td>
            <td>${formatDate(item.last_checked)}</td>
            <td><pre style="max-width:320px; margin:0; font-size:11px; padding:8px; max-height:80px; overflow:auto;">${(item.drift_details || 'No drift').slice(0, 300)}</pre></td>
            <td>${item.drift_detected
              ? `<button onclick="remediate(${item.device_id})" class="secondary" style="padding:6px 12px; font-size:12px;">🔧 Remediate</button>`
              : '<span class="small">—</span>'
            }</td>
          </tr>
        `).join('');
      } catch (err) {
        showMessage('compMsg', err.message, 'error');
      }
    }

    async function remediate(deviceId) {
      try {
        const status = await apiFetch(`/remediate/${deviceId}`, { method: 'POST', body: '{}' });
        showMessage('compMsg', `Device #${deviceId} remediated successfully. Status: ${status.status}`, 'success');
        await refreshTable();
      } catch (err) {
        showMessage('compMsg', err.message, 'error');
      }
    }

    loadCompliance();
  </script>
</body>
</html>
