<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compliance | Intent Controller</title>
  <link rel="stylesheet" href="/frontend/css/style.css" />
</head>
<body>
  <script src="/frontend/js/app.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth required');
    renderShell('Configuration Compliance', 'compliance');

    async function loadCompliance() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="card">
          <h3>Compliance Status</h3>
          <p>Compares intended config vs live config and detects drift.</p>
          <div id="compMsg" class="message" style="display:none"></div>
          <button id="refreshComp" class="ghost">Refresh Compliance</button>
          <table style="margin-top:12px;">
            <thead><tr><th>Device ID</th><th>Status</th><th>Drift</th><th>Last Checked</th><th>Details</th><th>Remediate</th></tr></thead>
            <tbody id="compTable"></tbody>
          </table>
        </div>
      `;

      document.getElementById('refreshComp').addEventListener('click', refreshTable);
      await refreshTable();
    }

    async function refreshTable() {
      try {
        const list = await apiFetch('/compliance');
        document.getElementById('compTable').innerHTML = list.map(item => `
          <tr>
            <td>${item.device_id}</td>
            <td><span class="badge ${item.status === 'compliant' ? 'ok' : 'err'}">${item.status}</span></td>
            <td>${item.drift_detected}</td>
            <td>${formatDate(item.last_checked)}</td>
            <td><pre style="max-width:380px; white-space:pre-wrap; margin:0">${(item.drift_details || '').slice(0, 220)}</pre></td>
            <td>${item.drift_detected ? `<button onclick="remediate(${item.device_id})" class="secondary">Remediate</button>` : '-'}</td>
          </tr>
        `).join('');
      } catch (err) {
        showMessage('compMsg', err.message, 'error');
        document.getElementById('compMsg').style.display = 'block';
      }
    }

    async function remediate(deviceId) {
      try {
        const status = await apiFetch(`/remediate/${deviceId}`, { method: 'POST', body: '{}' });
        showMessage('compMsg', `Device ${deviceId} remediated. Status: ${status.status}`, 'success');
        document.getElementById('compMsg').style.display = 'block';
        await refreshTable();
      } catch (err) {
        showMessage('compMsg', err.message, 'error');
        document.getElementById('compMsg').style.display = 'block';
      }
    }

    loadCompliance();
  </script>
</body>
</html>
