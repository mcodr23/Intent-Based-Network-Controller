<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devices | IBN Controller</title>
  <link rel="stylesheet" href="/frontend/css/style.css" />
</head>
<body>
  <script src="/frontend/js/app.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth required');
    renderShell('Device Inventory', 'devices');

    async function loadDevices() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="card">
          <div class="card-header">
            <h3>🔍 Network Discovery</h3>
          </div>
          <p>Scan a subnet or use the default mock device catalog to discover network endpoints.</p>
          <div id="discoveryMsg" class="message" style="display:none"></div>
          <form id="discoveryForm" style="display:grid; grid-template-columns:1fr auto; gap:12px; align-items:end;">
            <div>
              <label>Subnet (optional)</label>
              <input id="subnet" placeholder="10.0.0.0/29" />
            </div>
            <button type="submit">Run Discovery</button>
          </form>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>🖥️ Discovered Devices</h3>
          </div>
          <table>
            <thead>
              <tr>
                <th>ID</th><th>Hostname</th><th>Mgmt IP</th><th>Vendor</th><th>Model</th><th>Group</th><th>Status</th><th>Last Seen</th>
              </tr>
            </thead>
            <tbody id="devicesTable"></tbody>
          </table>
        </div>
      `;

      document.getElementById('discoveryForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const subnet = document.getElementById('subnet').value.trim();
        const payload = subnet ? { subnet } : {};
        try {
          const result = await apiFetch('/discovery/start', {
            method: 'POST',
            body: JSON.stringify(payload),
          });
          showMessage('discoveryMsg', `Scanned ${result.scanned} targets — Discovered ${result.discovered} devices`, 'success');
          renderDeviceRows(result.devices);
        } catch (err) {
          showMessage('discoveryMsg', err.message, 'error');
        }
      });

      try {
        const devices = await apiFetch('/devices');
        renderDeviceRows(devices);
      } catch (err) {
        document.getElementById('devicesTable').innerHTML = `<tr><td colspan="8">${err.message}</td></tr>`;
      }
    }

    function renderDeviceRows(devices) {
      document.getElementById('devicesTable').innerHTML = devices.map(d => `
        <tr>
          <td>${d.id}</td>
          <td style="color:var(--text-primary); font-weight:600;">${d.hostname}</td>
          <td><code style="font-family:'JetBrains Mono',monospace; font-size:12px; background:var(--bg-input); padding:2px 8px; border-radius:6px;">${d.management_ip}</code></td>
          <td>${d.vendor || '—'}</td>
          <td>${d.hardware_model || '—'}</td>
          <td><span class="badge info">${d.device_group}</span></td>
          <td><span class="badge ok">${d.status || 'up'}</span></td>
          <td>${formatDate(d.last_seen)}</td>
        </tr>
      `).join('');
    }

    loadDevices();
  </script>
</body>
</html>
